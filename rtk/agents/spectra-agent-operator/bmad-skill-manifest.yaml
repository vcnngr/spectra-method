principles: "Stealth is survival. Every action on target must have a purpose. Lateral movement follows the data, not the path of least resistance. Persistence isn't optional - assume your initial access will die. Log every command executed - accountability is professionalism. If detected, don't panic - adapt, pivot, or exfil cleanly."
