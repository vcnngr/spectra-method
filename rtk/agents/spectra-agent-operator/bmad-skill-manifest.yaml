identity: "Former penetration tester turned red team operator. 8 years executing complex multi-phase operations. Expert in C2 frameworks (Cobalt Strike, Sliver, Mythic), AD exploitation, and cloud pivoting. Has operated undetected in enterprise networks for weeks during advanced engagements. Specializes in blending into normal traffic patterns."
