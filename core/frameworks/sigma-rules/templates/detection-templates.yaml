      category: "process_creation"
      product: "windows"
    detection:
      selection_img:
        Image|endswith:
          - "\\powershell.exe"
          - "\\pwsh.exe"
      selection_amsi:
        CommandLine|contains:
          - "AmsiInitFailed"
          - "amsi.dll"
          - "AmsiUtils"
          - "amsiContext"
          - "AmsiScanBuffer"
          - "SetValue($null)"
          - "[Ref].Assembly.GetType"
          - "System.Management.Automation.AmsiUtils"
      condition: "selection_img and selection_amsi"
    falsepositives:
      - "Security research and testing"
      - "AMSI diagnostic scripts"
    level: "critical"

  - title: "ETW Tampering"
    id: "spectra-sigma-029"
    status: "experimental"
    description: "Detects attempts to tamper with Event Tracing for Windows (ETW) by patching EtwEventWrite, disabling providers, or manipulating trace sessions to blind security monitoring"
    references:
      - "https://attack.mitre.org/techniques/T1562/006/"
    author: "SPECTRA"
    date: "2026/04/05"
    tags:
      - "attack.defense_evasion"
      - "attack.t1562.006"
    logsource:
      category: "process_creation"
      product: "windows"
    detection:
      selection_cli:
        CommandLine|contains:
          - "EtwEventWrite"
          - "ntdll!EtwEventWrite"
          - "logman stop"
          - "logman delete"
          - "Set-EtwTraceProvider"
          - "Remove-EtwTraceProvider"
      selection_ps:
        Image|endswith:
          - "\\powershell.exe"
          - "\\pwsh.exe"
        CommandLine|contains:
          - "Reflection.Emit"
          - "NtTraceEvent"
          - "EtwpStopTrace"
      condition: "selection_cli or selection_ps"
    falsepositives:
      - "Legitimate ETW management by administrators"
      - "Performance monitoring configuration"
    level: "high"

  - title: "Suspicious WinRM Usage"
    id: "spectra-sigma-030"
    status: "experimental"
    description: "Detects suspicious Windows Remote Management (WinRM) usage including remote PowerShell sessions and lateral movement through WinRM/WSMan protocol"
    references:
      - "https://attack.mitre.org/techniques/T1021/006/"
    author: "SPECTRA"
    date: "2026/04/05"
    tags:
      - "attack.lateral_movement"
      - "attack.t1021.006"
    logsource:
      category: "process_creation"
      product: "windows"
    detection:
      selection_winrm:
        Image|endswith: "\\winrm.cmd"
      selection_ps_remoting:
        Image|endswith:
          - "\\powershell.exe"
          - "\\pwsh.exe"
        CommandLine|contains:
          - "Enter-PSSession"
          - "Invoke-Command"
          - "New-PSSession"
          - "-ComputerName"
          - "Enable-PSRemoting"
          - "winrm quickconfig"
      selection_wsmprovhost:
        ParentImage|endswith: "\\wsmprovhost.exe"
        Image|endswith:
          - "\\cmd.exe"
          - "\\powershell.exe"
          - "\\pwsh.exe"
      condition: "selection_winrm or selection_ps_remoting or selection_wsmprovhost"
    falsepositives:
      - "Legitimate remote administration via PowerShell remoting"
      - "Configuration management tools using WinRM"
    level: "medium"

  - title: "Cobalt Strike Beacon Indicators"
    id: "spectra-sigma-031"
    status: "experimental"
    description: "Detects Cobalt Strike Beacon execution patterns including named pipe creation, process injection targets, default configurations, and known command-line indicators"
    references:
      - "https://attack.mitre.org/techniques/T1071/001/"
      - "https://attack.mitre.org/software/S0154/"
    author: "SPECTRA"
    date: "2026/04/05"
    tags:
      - "attack.command_and_control"
      - "attack.t1071.001"
    logsource:
      category: "process_creation"
      product: "windows"
    detection:
      selection_default_pipes:
        CommandLine|contains:
          - "\\MSSE-"
          - "\\msagent_"
          - "\\postex_"
          - "\\status_"
          - "\\postex_ssh_"
      selection_spawn:
        ParentImage|endswith: "\\rundll32.exe"
        Image|endswith:
          - "\\cmd.exe"
          - "\\powershell.exe"
          - "\\dllhost.exe"
        CommandLine|contains:
          - "net view"
          - "whoami"
          - "net localgroup"
      selection_beacon_cli:
        CommandLine|contains:
          - "jump psexec"
          - "jump psexec_psh"
          - "jump winrm"
          - "remote-exec"
          - "beacon_inline_execute"
      condition: "selection_default_pipes or selection_spawn or selection_beacon_cli"
    falsepositives:
      - "Named pipes with similar naming conventions in legitimate software"
    level: "critical"

  - title: "DNS Beaconing Pattern"
    id: "spectra-sigma-032"
    status: "experimental"
    description: "Detects DNS-based command and control beaconing through periodic queries with encoded subdomains, suspicious TXT record lookups, and high-frequency queries to single domains"
    references:
      - "https://attack.mitre.org/techniques/T1071/004/"
    author: "SPECTRA"
    date: "2026/04/05"
    tags:
      - "attack.command_and_control"
      - "attack.t1071.004"
    logsource:
      category: "dns_query"
      product: "windows"
    detection:
      selection_encoded:
        QueryName|re: "^[a-f0-9]{16,}\\."
      selection_base64:
        QueryName|re: "^[A-Za-z0-9+/]{20,}=*\\."
      selection_null_type:
        QueryType:
          - "NULL"
          - "CNAME"
          - "MX"
        QueryName|re: "^[a-zA-Z0-9]{15,}\\."
      condition: "selection_encoded or selection_base64 or selection_null_type"
    falsepositives:
      - "DKIM and SPF record lookups"
      - "Legitimate services using encoded DNS names"
    level: "high"

  - title: "Data Staging in Temp Directory"
    id: "spectra-sigma-033"
    status: "experimental"
    description: "Detects suspicious file operations in temporary directories consistent with adversary data staging prior to exfiltration, including large file creation and archive operations"
    references:
      - "https://attack.mitre.org/techniques/T1074/001/"
    author: "SPECTRA"
    date: "2026/04/05"
    tags:
      - "attack.collection"
      - "attack.t1074.001"
    logsource:
      category: "process_creation"
      product: "windows"
    detection:
      selection_copy:
        Image|endswith:
          - "\\xcopy.exe"
          - "\\robocopy.exe"
          - "\\cmd.exe"
        CommandLine|contains:
          - "\\Temp\\"
          - "\\tmp\\"
          - "\\ProgramData\\"
          - "\\Users\\Public\\"
      selection_staging:
        Image|endswith:
          - "\\powershell.exe"
          - "\\pwsh.exe"
        CommandLine|contains:
          - "Copy-Item"
          - "Move-Item"
          - "Get-ChildItem -Recurse"
          - "Compress-Archive"
        CommandLine|contains:
          - "\\Temp\\"
          - "\\tmp\\"
          - "\\ProgramData\\"
      condition: "selection_copy or selection_staging"
    falsepositives:
      - "Legitimate backup scripts"
      - "Software update staging"
      - "System maintenance operations"
    level: "medium"

  - title: "Large File Transfer Detection"
    id: "spectra-sigma-034"
    status: "experimental"
    description: "Detects potential data exfiltration through large file transfers using common command-line tools, cloud upload utilities, and known exfiltration channels"
    references:
      - "https://attack.mitre.org/techniques/T1048/"
    author: "SPECTRA"
    date: "2026/04/05"
    tags:
      - "attack.exfiltration"
      - "attack.t1048"
    logsource:
      category: "process_creation"
      product: "windows"
    detection:
      selection_ftp:
        Image|endswith:
          - "\\ftp.exe"
          - "\\sftp.exe"
        CommandLine|contains:
          - "put "
          - "mput "
          - "send "
      selection_curl:
        Image|endswith:
          - "\\curl.exe"
          - "\\wget.exe"
        CommandLine|contains:
          - "--upload-file"
          - "-T "
          - "--data-binary"
          - "-X POST"
          - "-X PUT"
      selection_cloud:
        CommandLine|contains:
          - "rclone"
          - "megacmd"
          - "MEGAcmdShell"
          - "azcopy"
          - "aws s3 cp"
          - "gsutil cp"
      selection_scp:
        Image|endswith: "\\scp.exe"
      condition: "selection_ftp or selection_curl or selection_cloud or selection_scp"
    falsepositives:
      - "Legitimate file transfers and cloud backups"
      - "DevOps deployment pipelines"
      - "Authorized cloud sync tools"
    level: "medium"

  - title: "Windows Event Log Clearing"
    id: "spectra-sigma-035"
    status: "experimental"
    description: "Detects attempts to clear Windows event logs using wevtutil, Clear-EventLog PowerShell cmdlet, or direct log file deletion to cover tracks"
    references:
      - "https://attack.mitre.org/techniques/T1070/001/"
    author: "SPECTRA"
    date: "2026/04/05"
    tags:
      - "attack.defense_evasion"
      - "attack.t1070.001"
    logsource:
      category: "process_creation"
      product: "windows"
    detection:
      selection_wevtutil:
        Image|endswith: "\\wevtutil.exe"
        CommandLine|contains:
          - "cl "
          - "clear-log"
      selection_ps:
        Image|endswith:
          - "\\powershell.exe"
          - "\\pwsh.exe"
        CommandLine|contains:
          - "Clear-EventLog"
          - "Remove-EventLog"
          - "Limit-EventLog"
          - "[System.Diagnostics.Eventing.Reader.EventLogSession]::GlobalSession.ClearLog"
      selection_fsutil:
        Image|endswith: "\\fsutil.exe"
        CommandLine|contains:
          - "usn deletejournal"
      condition: "selection_wevtutil or selection_ps or selection_fsutil"
    falsepositives:
      - "Legitimate log maintenance by administrators"
      - "Automated log rotation scripts"
    level: "critical"
