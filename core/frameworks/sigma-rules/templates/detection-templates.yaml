    falsepositives:
      - "Authorized red team operations"
      - "Penetration testing tools"
    level: "critical"

  - title: "Process Injection via CreateRemoteThread"
    id: "spectra-sigma-027"
    status: "experimental"
    description: "Detects potential process injection through CreateRemoteThread API calls from suspicious source processes targeting common injection targets like explorer.exe and svchost.exe"
    references:
      - "https://attack.mitre.org/techniques/T1055/001/"
    author: "SPECTRA"
    date: "2026/04/05"
    tags:
      - "attack.defense_evasion"
      - "attack.privilege_escalation"
      - "attack.t1055.001"
    logsource:
      category: "create_remote_thread"
      product: "windows"
    detection:
      selection:
        TargetImage|endswith:
          - "\\svchost.exe"
          - "\\explorer.exe"
          - "\\lsass.exe"
          - "\\winlogon.exe"
          - "\\csrss.exe"
          - "\\services.exe"
          - "\\spoolsv.exe"
      filter_legitimate:
        SourceImage|endswith:
          - "\\csrss.exe"
          - "\\lsass.exe"
          - "\\services.exe"
          - "\\svchost.exe"
          - "\\wininit.exe"
          - "\\MsMpEng.exe"
          - "\\MpCmdRun.exe"
      condition: "selection and not filter_legitimate"
    falsepositives:
      - "Legitimate software using thread injection for hooking"
      - "Security products performing process inspection"
    level: "high"

  - title: "AMSI Bypass Attempt"
    id: "spectra-sigma-028"
    status: "experimental"
    description: "Detects attempts to bypass the Antimalware Scan Interface (AMSI) through PowerShell reflection, memory patching, or known bypass techniques"
    references:
      - "https://attack.mitre.org/techniques/T1562/001/"
